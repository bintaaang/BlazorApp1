name: Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test (if available)
        run: dotnet test --no-build -c Release -v q 2>/dev/null || echo "No test project found"

      - name: Build Docker image (verify)
        run: docker build -t blazorapp-test -f Dockerfile .
